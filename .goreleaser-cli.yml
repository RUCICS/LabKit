version: 2
project_name: labkit

release:
  github:
    owner: RUCICS
    name: LabKit

builds:
  # Unix archives: binary name includes OS/ARCH (matches common handout naming, e.g. labkit-linux-amd64).
  - id: labkit-unix
    main: ./apps/cli/cmd/labkit
    binary: "labkit-{{ .Os }}-{{ .Arch }}"
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X labkit.local/apps/cli/internal/buildinfo.Version={{ .Tag }}
      - -X labkit.local/apps/cli/internal/buildinfo.Commit={{ .Commit }}
      - -X labkit.local/apps/cli/internal/buildinfo.Date={{ .Date }}

  - id: labkit-windows
    main: ./apps/cli/cmd/labkit
    binary: "labkit-windows-{{ .Arch }}"
    env:
      - CGO_ENABLED=0
    goos:
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X labkit.local/apps/cli/internal/buildinfo.Version={{ .Tag }}
      - -X labkit.local/apps/cli/internal/buildinfo.Commit={{ .Commit }}
      - -X labkit.local/apps/cli/internal/buildinfo.Date={{ .Date }}

archives:
  - id: default
    builds:
      - labkit-unix
      - labkit-windows
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: >-
      {{ .ProjectName }}_{{ .Tag }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: "checksums.txt"

changelog:
  disable: true

