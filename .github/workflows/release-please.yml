name: Release Please

on:
  push:
    branches: ["main"]
    paths:
      - "apps/cli/**"
      - "docs/reference/cli.md"
      - "go.work"
      - "go.work.sum"
      - ".github/workflows/release-please.yml"

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json
