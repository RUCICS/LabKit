# When Release Please merges a version bump, the manifest updates but no GitHub Release
# is created (skip-github-release). This workflow pushes the matching v* git tag so
# release-cli.yml (GoReleaser) runs and publishes artifacts — without Release Please
# creating a duplicate release page.
name: Tag CLI version from manifest

on:
  push:
    branches: ["main"]
    paths:
      - ".release-please-manifest.json"

permissions:
  contents: write

concurrency:
  group: tag-cli-from-manifest
  cancel-in-progress: false

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read CLI version and push tag if missing
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="$(jq -r '.["apps/cli"] // empty' .release-please-manifest.json | tr -d '\r')"
          if [[ -z "${VERSION}" || "${VERSION}" == "null" ]]; then
            echo "No apps/cli version in manifest; skipping."
            exit 0
          fi
          TAG="v${VERSION}"
          if [[ -n "$(git ls-remote origin "refs/tags/${TAG}")" ]]; then
            echo "Tag ${TAG} already exists on origin; skipping."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "release labkit ${VERSION}" "${GITHUB_SHA}"
          git push origin "refs/tags/${TAG}"
