version: "2"

sql:
  - engine: postgresql
    schema:
      - db/migrations/*up.sql
    queries:
      - db/queries/*.sql
    gen:
      go:
        package: sqlc
        out: packages/go/db/sqlc
        sql_package: pgx/v5
        emit_json_tags: true
        emit_empty_slices: true
        emit_exact_table_names: true
        overrides:
          - db_type: uuid
            go_type:
              import: github.com/google/uuid
              type: UUID
          - db_type: jsonb
            go_type:
              import: encoding/json
              type: RawMessage
